version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: gencom-pay-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: gencom_pay
    ports:
      - '5444:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gencom-network

  redis:
    image: redis:7-alpine
    container_name: gencom-pay-redis
    restart: always
    ports:
      - '6388:6379'
    volumes:
      - redis_data:/data
    networks:
      - gencom-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gencom-pay-api
    restart: always
    environment:
      - PORT=4000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_DATABASE=gencom_pay
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
    ports:
      - '4000:4000'
    depends_on:
      - db
      - redis
    volumes:
      - ./api/uploads:/app/uploads
    networks:
      - gencom-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.generexcom.com}
    container_name: gencom-pay-web
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.generexcom.com}
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks:
      - gencom-network

networks:
  gencom-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
